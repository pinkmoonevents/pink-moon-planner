<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Moon · 2027 Event Planner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --pink:#DF5C7D; --pink-dark:#B8365A; --pink-light:#F9D7E0;
    --blue:#023146; --blue-mid:#034a6b; --blue-light:#D6E4ED;
    --pre:#5B8DB8; --build:#E07B4A; --show:#DF5C7D; --brk:#5BA87A;
    --bg:#F7F6F3; --surface:#FFFFFF; --surface2:#F2F1EE;
    --border:rgba(2,49,70,0.12); --text:#1A1A1A; --muted:#6B6B6B; --faint:#9B9B9B;
    --radius:10px; --radius-lg:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

  .topbar{background:var(--blue);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
  .topbar-left{display:flex;align-items:center;gap:16px}
  .logo-mark{width:32px;height:32px;border-radius:8px;background:var(--pink);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;letter-spacing:-0.5px}
  .topbar-title{font-size:14px;font-weight:500;color:#fff}
  .topbar-sub{font-size:12px;color:rgba(255,255,255,0.5);margin-left:8px}
  .btn-add{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--pink);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s}
  .btn-add:hover{background:var(--pink-dark)}

  .main{display:flex;height:calc(100vh - 56px);overflow:hidden}

  .sidebar{width:224px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
  .sidebar-section{padding:12px 8px 4px}
  .sidebar-label{font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;padding:0 8px;margin-bottom:4px}
  .sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .12s}
  .sidebar-item:hover{background:var(--surface2);color:var(--text)}
  .sidebar-item.active{background:var(--pink-light);color:var(--pink-dark);font-weight:500}
  .sidebar-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
  .sidebar-meta{font-size:10px;color:var(--faint);margin-left:auto;font-family:'DM Mono',monospace;white-space:nowrap}
  .sidebar-empty{padding:14px 18px;font-size:12px;color:var(--faint);line-height:1.6}
  .sidebar-stats{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
  .stat-mini{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
  .stat-mini span:first-child{color:var(--muted)}
  .stat-mini span:last-child{font-weight:500;font-family:'DM Mono',monospace}
  .overlap-warn{margin:8px 0 0;padding:8px 10px;background:#FFF8E6;border:1px solid #F5D47A;border-radius:8px;font-size:11px;color:#7A5C00;line-height:1.5}

  .content{flex:1;overflow-y:auto}
  .overview-panel{padding:24px}
  .panel-header{margin-bottom:20px}
  .panel-header h2{font-size:20px;font-weight:500;margin-bottom:4px}
  .panel-header p{font-size:13px;color:var(--muted)}
  .gantt-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
  .gantt-empty{padding:48px 24px;text-align:center;color:var(--muted);font-size:14px}
  .gantt-scroll{overflow-x:auto}
  .legend-bar{display:flex;gap:20px;padding:10px 16px;border-top:1px solid var(--border);flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .legend-swatch{width:10px;height:10px;border-radius:2px}

  .event-detail{padding:24px}
  .ev-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:12px;flex-wrap:wrap}
  .ev-name{font-size:22px;font-weight:500;line-height:1.2}
  .ev-meta{font-size:13px;color:var(--muted);margin-top:4px}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;margin-right:4px}
  .badge-blue{background:var(--blue-light);color:var(--blue)}
  .badge-pink{background:var(--pink-light);color:var(--pink-dark)}
  .badge-green{background:#E6F4EC;color:#1A6B3A}
  .badge-amber{background:#FFF3DC;color:#7A4F00}

  .grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
  .metric-card{background:var(--surface2);border-radius:var(--radius);padding:12px 14px}
  .metric-card .mv{font-size:22px;font-weight:500}
  .metric-card .ml{font-size:11px;color:var(--muted);margin-top:2px}

  .show-windows{margin-bottom:20px}
  .show-windows-head{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .show-window-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--show)}
  .show-window-item .sw-label{font-size:12px;color:var(--muted);min-width:60px}
  .show-window-item .sw-dates{font-size:13px;font-weight:500;font-family:'DM Mono',monospace}
  .show-window-item .sw-days{font-size:11px;color:var(--muted);margin-left:auto}

  .phase-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:20px}
  .phase-block{border-radius:var(--radius);padding:10px 12px;background:var(--surface2)}
  .phase-block .pl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
  .phase-block .pv{font-size:13px;font-weight:500}
  .phase-block .pd{font-size:11px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace}

  .services-section{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}

  .notes-section{background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:16px;font-size:13px;line-height:1.7}
  .ai-section{background:linear-gradient(135deg,#F9D7E0 0%,#D6E4ED 100%);border-radius:var(--radius-lg);padding:16px;margin-bottom:20px}
  .ai-section-head{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--blue);margin-bottom:10px}
  .ai-dot{width:6px;height:6px;border-radius:50%;background:var(--pink)}
  .ai-text{font-size:13px;color:var(--blue);line-height:1.7;white-space:pre-wrap}
  .ai-text.loading{opacity:0.6;font-style:italic}
  .ai-regen{margin-top:10px;padding:5px 12px;background:rgba(255,255,255,0.6);border:1px solid rgba(2,49,70,0.2);border-radius:6px;font-size:11px;font-weight:500;color:var(--blue);font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s}
  .ai-regen:hover{background:rgba(255,255,255,0.9)}

  .btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .12s;border:1px solid transparent}
  .btn-primary{background:var(--pink);color:#fff;border-color:var(--pink)}
  .btn-primary:hover{background:var(--pink-dark);border-color:var(--pink-dark)}
  .btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
  .btn-outline:hover{background:var(--surface2)}
  .btn-danger{background:transparent;color:#C0392B;border-color:rgba(192,57,43,0.3)}
  .btn-danger:hover{background:#FDECEA}
  .btn-sm{padding:6px 12px;font-size:12px}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(2,49,70,0.45);z-index:200;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:600px;box-shadow:0 20px 60px rgba(0,0,0,0.2);margin:auto}
  .modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{font-size:16px;font-weight:500}
  .modal-close{width:28px;height:28px;border-radius:6px;background:var(--surface2);border:none;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
  .modal-close:hover{background:var(--border)}
  .modal-body{padding:20px 24px;max-height:72vh;overflow-y:auto}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}

  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
  .form-row.full{grid-template-columns:1fr}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group.full{grid-column:1/-1}
  label{font-size:12px;font-weight:500;color:var(--muted)}
  input[type=text],input[type=date],input[type=number],select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);transition:border-color .12s;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--pink)}
  textarea{resize:vertical;min-height:56px;line-height:1.6}
  .form-section-label{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px;padding-top:14px;border-top:1px solid var(--border)}

  .show-dates-list{margin-bottom:8px}
  .show-date-row{display:grid;grid-template-columns:1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:8px}
  .show-date-row label{font-size:11px;color:var(--muted);margin-bottom:3px}
  .remove-btn{width:28px;height:28px;border-radius:6px;background:transparent;border:1px solid rgba(192,57,43,0.25);color:#C0392B;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;font-family:'DM Sans',sans-serif;flex-shrink:0;align-self:flex-end;margin-bottom:0;padding:0}
  .remove-btn:hover{background:#FDECEA}
  .add-date-btn{padding:6px 12px;background:transparent;border:1px dashed var(--border);border-radius:7px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:all .12s}
  .add-date-btn:hover{border-color:var(--pink);color:var(--pink)}

  .services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:4px}
  .service-chip{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:7px;border:1px solid var(--border);cursor:pointer;font-size:12px;color:var(--muted);transition:all .12s;user-select:none}
  .service-chip:hover{border-color:var(--pink);color:var(--pink-dark)}
  .service-chip.selected{background:var(--pink-light);border-color:var(--pink);color:var(--pink-dark);font-weight:500}
  .service-chip input{display:none}
  .service-chip-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .12s}
  .service-chip.selected .service-chip-dot{background:var(--pink)}

  .overlap-badge{display:flex;align-items:center;gap:6px;padding:9px 14px;background:#FFF8E6;border-bottom:1px solid #F5D47A;font-size:12px;color:#7A5C00}


  .sub-toggle{display:flex;align-items:center;gap:10px;padding:10px 0;margin-bottom:4px}
  .sub-toggle-label{font-size:13px;font-weight:500;color:var(--text)}
  .sub-toggle-desc{font-size:12px;color:var(--muted)}
  .toggle-switch{position:relative;width:36px;height:20px;flex-shrink:0;cursor:pointer}
  .toggle-switch input{opacity:0;width:0;height:0;position:absolute}
  .toggle-track{position:absolute;inset:0;background:var(--border);border-radius:10px;transition:background .2s}
  .toggle-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle-switch input:checked ~ .toggle-track{background:var(--pink)}
  .toggle-switch input:checked ~ .toggle-thumb{transform:translateX(16px)}

  .sub-events-section{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
  .sub-event-card{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
  .sub-event-card-head{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface2);cursor:pointer;transition:background .12s}
  .sub-event-card-head:hover{background:#eee}
  .sub-event-card-head .se-num{width:20px;height:20px;border-radius:5px;background:var(--pink);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sub-event-card-head .se-name{font-size:13px;font-weight:500;flex:1}
  .sub-event-card-head .se-type{font-size:11px;color:var(--muted)}
  .sub-event-card-head .se-chevron{font-size:10px;color:var(--faint);transition:transform .2s;margin-left:4px}
  .sub-event-card-head.open .se-chevron{transform:rotate(180deg)}
  .sub-event-card-body{display:none;padding:12px;border-top:1px solid var(--border);background:var(--surface)}
  .sub-event-card-body.open{display:block}
  .date-field-wrap{position:relative}
  .date-field-wrap .inherit-badge{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--faint);pointer-events:none;background:var(--surface);padding:0 2px}
  .date-field-wrap input.inherited{color:var(--muted);font-style:italic}
  .date-field-wrap input.overridden{color:var(--text);font-style:normal}
  .add-sub-btn{width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:8px;background:transparent;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;margin-top:4px}
  .add-sub-btn:hover{border-color:var(--pink);color:var(--pink)}
  .sub-limit-note{font-size:11px;color:var(--faint);text-align:center;margin-top:6px}

  .detail-sub-events{margin-bottom:20px}
  .detail-sub-head{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
  .detail-sub-card{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
  .detail-sub-card-head{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);cursor:pointer}
  .detail-sub-card-head:hover{background:#eee}
  .detail-sub-card-head .dse-dot{width:8px;height:8px;border-radius:2px;background:var(--pink);flex-shrink:0}
  .detail-sub-card-head .dse-name{font-size:13px;font-weight:500;flex:1}
  .detail-sub-card-head .dse-chips{display:flex;gap:4px;flex-wrap:wrap}
  .detail-sub-card-head .dse-chevron{font-size:10px;color:var(--faint);transition:transform .2s;margin-left:4px}
  .detail-sub-card-head.open .dse-chevron{transform:rotate(180deg)}
  .detail-sub-body{display:none;padding:12px 14px;border-top:1px solid var(--border);background:var(--surface)}
  .detail-sub-body.open{display:block}
  .dse-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px}
  .dse-item{background:var(--surface2);border-radius:7px;padding:8px 10px}
  .dse-item .di-l{font-size:10px;color:var(--muted);margin-bottom:3px}
  .dse-item .di-v{font-size:12px;font-weight:500;font-family:'DM Mono',monospace}
  .dse-item .di-badge{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--pink-light);color:var(--pink-dark)}

  .gantt-sub-row rect.sub-bar{opacity:0.75}

  .kit-panel{padding:24px}
  .kit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .kit-header h2{font-size:20px;font-weight:500}
  .kit-header p{font-size:13px;color:var(--muted);margin-top:2px}
  .kit-tabs{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--border);margin-bottom:0}
  .kit-tab{padding:7px 14px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:color .12s;font-family:'DM Sans',sans-serif;background:none;border-top:none;border-left:none;border-right:none}
  .kit-tab:hover{color:var(--text)}
  .kit-tab.active{color:var(--pink);border-bottom-color:var(--pink)}
  .kit-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);background:var(--surface);overflow:hidden}
  .kit-totals-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
  .kit-totals-bar .kt-label{font-size:12px;color:var(--muted)}
  .kit-totals-bar .kt-val{font-size:13px;font-weight:500;font-family:'DM Mono',monospace}
  .kit-totals-bar .kt-export{padding:5px 12px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
  .kit-totals-bar .kt-export:hover{background:var(--blue-mid)}
  .kit-cat-head{display:flex;align-items:center;gap:8px;padding:9px 16px;background:var(--surface2);cursor:pointer;border-bottom:1px solid var(--border);user-select:none}
  .kit-cat-head:hover{background:#eaeae8}
  .kit-cat-head .kch-name{font-size:12px;font-weight:600;color:var(--text);flex:1}
  .kit-cat-head .kch-count{font-size:11px;color:var(--muted)}
  .kit-cat-head .kch-chevron{font-size:10px;color:var(--faint);transition:transform .15s}
  .kit-cat-head.open .kch-chevron{transform:rotate(180deg)}
  .kit-cat-body{display:none}
  .kit-cat-body.open{display:block}
  .kit-item-row{display:grid;align-items:center;border-bottom:0.5px solid var(--border)}
  .kit-item-row:last-child{border-bottom:none}
  .kit-item-name{padding:7px 16px 7px 20px;font-size:12px;color:var(--text);background:var(--surface)}
  .kit-item-name.has-qty{font-weight:500;color:var(--blue)}
  .kit-qty-cell{padding:4px 6px;border-left:0.5px solid var(--border);background:var(--surface)}
  .kit-qty-cell.total-cell{background:var(--surface2);font-weight:500}
  .kit-qty-input{width:100%;padding:4px 6px;border:none;background:transparent;font-size:12px;text-align:center;font-family:'DM Mono',monospace;color:var(--text);outline:none}
  .kit-qty-input:focus{background:var(--pink-light);border-radius:4px}
  .kit-qty-input.has-val{background:#EEF6FF;border-radius:4px;color:var(--blue);font-weight:500}
  .kit-col-head{padding:6px 6px;font-size:10px;font-weight:600;text-align:center;color:var(--muted);background:var(--surface2);border-left:0.5px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid var(--border)}
  .kit-col-head.total-head{background:#EFF2F4;color:var(--blue)}
  .kit-sticky-head{position:sticky;top:0;z-index:10;display:grid;background:var(--surface2);border-bottom:1px solid var(--border)}
  .kit-scroll-body{overflow-y:auto;max-height:60vh}
  .kit-empty{padding:32px;text-align:center;color:var(--muted);font-size:13px}
  .kit-add-note{padding:12px 16px;font-size:12px;color:var(--faint);border-top:1px solid var(--border);background:var(--surface2)}

  .prod-qty-input{width:60px;padding:4px 6px;border:none;background:transparent;font-size:12px;text-align:center;font-family:'DM Mono',monospace;color:var(--text);outline:none}
  .prod-qty-input:focus{background:var(--pink-light);border-radius:4px}
  .prod-qty-input.has-val{background:#EEF6FF;border-radius:4px;color:var(--blue);font-weight:500}
  .prod-price-input{width:80px;padding:4px 6px;border:none;background:transparent;font-size:12px;text-align:right;font-family:'DM Mono',monospace;color:var(--muted);outline:none}
  .prod-price-input:focus{background:#FFF9EC;border-radius:4px;color:var(--text)}
  .prod-rev-cell{padding:4px 8px;font-size:12px;font-family:'DM Mono',monospace;color:var(--blue);text-align:right;font-weight:500}
  .prod-rev-total{background:#EFF2F4;font-weight:600;color:var(--blue)}
  .rev-summary{display:flex;gap:16px;padding:10px 16px;background:var(--blue-light);border-bottom:1px solid var(--border);flex-wrap:wrap}
  .rev-summary .rs-item{font-size:12px;color:var(--blue)}
  .rev-summary .rs-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;color:var(--blue);margin-left:4px}

  .recipe-modal{max-width:680px}
  .recipe-grid{display:grid;grid-template-columns:1fr 80px;gap:0}
  .recipe-item-row{display:contents}

function openEditModal(id) {

function showDateRow(s, e, i) {
  return `<div class="show-date-row" id="sdr-${i}">
    <div class="form-group">
      <label>Show start</label>
      <input type="date" class="sd-start" value="${s||''}">
    </div>
    <div class="form-group">
      <label>Show end</label>
      <input type="date" class="sd-end" value="${e||''}">
    </div>
    <button class="remove-btn" onclick="removeShowDateRow(${i})" title="Remove">×</button>
  </div>`;
}

function addShowDateRow() {
  const list = document.getElementById('show-dates-list');
  const i = list.children.length;
  const div = document.createElement('div');
  div.innerHTML = showDateRow('', '', i);
  list.appendChild(div.firstElementChild);
}

function removeShowDateRow(i) {
  const el = document.getElementById('sdr-'+i);
  if (el && document.querySelectorAll('.show-date-row').length > 1) el.remove();
}

function buildServiceChips(format, selected=[]) {
  const opts = SERVICE_OPTIONS[format] || SERVICE_OPTIONS['Festival'];
  return opts.map(s => `
    <div class="service-chip ${selected.includes(s)?'selected':''}" onclick="toggleService(this,'${esc(s)}')">
      <div class="service-chip-dot"></div>${esc(s)}
    </div>`).join('');
}

function onFormatChange(fmt) {
  document.getElementById('services-grid').innerHTML = buildServiceChips(fmt, []);
}

function toggleService(el) {
  el.classList.toggle('selected');
}

function getFormData() {
  const showDates = [];
  document.querySelectorAll('.show-date-row').forEach(row => {
    const s = row.querySelector('.sd-start')?.value;
    const e = row.querySelector('.sd-end')?.value;
    if (s || e) showDates.push({s: s||'', e: e||''});
  });
  const services = [...document.querySelectorAll('.service-chip.selected')].map(el => el.textContent.trim());
  return {
    name: document.getElementById('f-name').value.trim(),
    code: document.getElementById('f-code').value.trim().toUpperCase(),
    format: document.getElementById('f-format').value,
    venue: document.getElementById('f-venue').value.trim(),
    responsibility: document.getElementById('f-resp').value.trim(),
    customers: document.getElementById('f-cust').value,
    services,
    pre: document.getElementById('f-pre').value,
    build: document.getElementById('f-build').value,
    show_dates: showDates.length ? showDates : [{s:'',e:''}],
    brk: document.getElementById('f-brk').value,
    notes: document.getElementById('f-notes').value.trim(),
    ai_notes: document.getElementById('modal-ai-out')?.textContent||'',
    use_sub_events: document.getElementById('f-use-sub')?.checked || false,
    sub_events: (() => {
      if (!document.getElementById('f-use-sub')?.checked) return [];
      const pd = { pre: document.getElementById('f-pre').value, build: document.getElementById('f-build').value, show_dates: (() => { const rows=document.querySelectorAll('.show-date-row'); const arr=[]; rows.forEach(r=>{const s=r.querySelector('.sd-start')?.value; const e=r.querySelector('.sd-end')?.value; if(s||e)arr.push({s:s||'',e:e||''});}); return arr.length?arr:[{s:'',e:''}]; })(), brk: document.getElementById('f-brk').value };
      return readSubEventsFromForm(pd);
    })(),
  };
}

async function generateAI() {
  const f = getFormData();
  if (!f.name) { alert('Enter an event name first.'); return; }
  const el = document.getElementById('modal-ai-out');
  el.className = 'ai-text loading';
  el.textContent = 'Generating briefing...';
  const showStr = f.show_dates.map(sd => `${sd.s||'TBC'}–${sd.e||'TBC'}`).join(', ');
  const prompt = `You are a briefing assistant for Pink Moon (Festival Extras Limited), a UK VIP festival services company. Write a concise 3-4 sentence operational briefing for this 2027 event. Be direct and practical — no preamble.

Event: ${f.name} (${f.code||'?'}) | Format: ${f.format}
Venue: ${f.venue||'TBC'} | Lead: ${f.responsibility||'TBC'} | Customers: ${f.customers||'TBC'}
Services: ${f.services.join(', ')||'TBC'}
Build: ${f.build||'TBC'} | Show windows: ${showStr} | Break end: ${f.brk||'TBC'}
Notes: ${f.notes||'none'}

Cover: Pink Moon's role, format type, key dates, lead, and any operational considerations.`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    el.className = 'ai-text';
    el.textContent = data.content?.find(b=>b.type==='text')?.text || 'Could not generate briefing.';
  } catch(e) {
    el.className = 'ai-text';
    el.textContent = 'Error — please try again.';
  }
}


// ── SUB-EVENT HELPERS ─────────────────────────────────────────────────
function subUid() { return 'se_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function getParentDatesFromForm() {
  return {
    pre: document.getElementById('f-pre')?.value || '',
    build: document.getElementById('f-build')?.value || '',
    show_dates: (() => {
      const rows = document.querySelectorAll('.show-date-row');
      const arr = [];
      rows.forEach(r => {
        const s = r.querySelector('.sd-start')?.value;
        const e = r.querySelector('.sd-end')?.value;
        if (s||e) arr.push({s:s||'',e:e||''});
      });
      return arr.length ? arr : [{s:'',e:''}];
    })(),
    brk: document.getElementById('f-brk')?.value || '',
  };
}

function defaultSubEvent(parentDates, num) {
  return {
    id: subUid(),
    name: 'Area '+(num||1),
    service_type: '',
    responsibility: '',
    customers: '',
    pre: parentDates.pre || '',
    build: parentDates.build || '',
    show_dates: JSON.parse(JSON.stringify(parentDates.show_dates || [{s:'',e:''}])),
    brk: parentDates.brk || '',
    notes: '',
  };
}

function renderSubEventCard(se, idx, parentDates, collapsed=true) {
  const serviceOpts = [...(SERVICE_OPTIONS['Festival']), ...(SERVICE_OPTIONS['Day Show'])]

      <div class="form-group">
        <label style="font-size:11px">Show start ${(se.show_dates||[]).length>1?'(window '+(si+1)+')':''}</label>
        <div class="date-field-wrap">
          <input type="date" class="se-show-s" data-pi="${si}" value="${sd.s||''}"
            style="width:100%;font-size:12px;padding:6px 8px"
            onchange="markOverridden(this,'${(parentDates.show_dates||[])[si]?.s||''}')">
        </div>
      </div>
      <div class="form-group">
        <label style="font-size:11px">Show end ${(se.show_dates||[]).length>1?'(window '+(si+1)+')':''}</label>
        <div class="date-field-wrap">
          <input type="date" class="se-show-e" data-pi="${si}" value="${sd.e||''}"
            style="width:100%;font-size:12px;padding:6px 8px"

        </div>
      </div>
    </div>`).join('');

  return `<div class="sub-event-card" id="sec-${idx}">
    <div class="sub-event-card-head ${!collapsed?'open':''}" onclick="toggleSubCard(${idx})">
      <div class="se-num">${idx+1}</div>
      <span class="se-name">${esc(se.name||'Unnamed area')}</span>
      <span class="se-type">${esc(se.service_type||'No type set')}</span>
      <button onclick="event.stopPropagation();removeSubEvent(${idx})" style="margin-left:auto;padding:2px 7px;border:1px solid rgba(192,57,43,0.25);border-radius:5px;background:transparent;color:#C0392B;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif">Remove</button>
      <span class="se-chevron">▼</span>
    </div>
    <div class="sub-event-card-body ${!collapsed?'open':''}" id="secb-${idx}">
      <div class="form-row" style="margin-bottom:10px">
        <div class="form-group"><label>Area name</label><input type="text" class="se-name-input" value="${esc(se.name)}" placeholder="e.g. Boutique Campsite" style="font-size:13px"></div>
        <div class="form-group"><label>Service type</label>
          <select class="se-type-select" style="font-size:13px">

      </div>
      <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:2px">
        <div style="font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Dates <span style="font-weight:400;color:var(--faint);font-size:10px">(inherited from parent — edit to override)</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <div class="form-group">
            <label style="font-size:11px">Pre-build <span style="font-weight:400;color:var(--faint)">(optional)</span></label>
            <input type="date" class="se-pre" value="${se.pre||''}" style="font-size:12px;padding:6px 8px;width:100%"
              onchange="markOverridden(this,'${parentDates.pre||''}')">
          </div>
          <div class="form-group">
            <label style="font-size:11px">Build start</label>
            <input type="date" class="se-build" value="${se.build||''}" style="font-size:12px;padding:6px 8px;width:100%"

          <label style="font-size:11px">Break end</label>

function markOverridden(input, parentVal) {
  input.classList.toggle('overridden', input.value !== parentVal);
  input.classList.toggle('inherited', input.value === parentVal);
}

function toggleSubCard(idx) {
  const head = document.querySelector(`#sec-${idx} .sub-event-card-head`);
  const body = document.getElementById(`secb-${idx}`);
  head.classList.toggle('open');
  body.classList.toggle('open');
}

function removeSubEvent(idx) {
  const card = document.getElementById(`sec-${idx}`);
  if (card) card.remove();
  renumberSubCards();
}

function renumberSubCards() {
  document.querySelectorAll('.sub-event-card').forEach((card, i) => {
    card.id = `sec-${i}`;
    const head = card.querySelector('.sub-event-card-head');
    const body = card.querySelector('.sub-event-card-body');
    if (head) { head.setAttribute('onclick', `toggleSubCard(${i})`); head.querySelector('.se-num').textContent = i+1; head.querySelector('button').setAttribute('onclick', `event.stopPropagation();removeSubEvent(${i})`); }
    if (body) body.id = `secb-${i}`;
  });
}


function toggleSubSection(checked) {
  document.getElementById('sub-events-section').style.display = checked ? 'block' : 'none';
  document.getElementById('sub-toggle-label').textContent = checked ? 'Multiple areas' : 'Single area';
  document.getElementById('sub-toggle-desc').textContent = checked ? 'Each area has its own dates and lead' : 'No sub-events — one operational area';
  if (checked && document.querySelectorAll('.sub-event-card').length === 0) addSubEvent();
}

function addSubEvent() {
  const existing = document.querySelectorAll('.sub-event-card').length;
  if (existing >= 10) { alert('Maximum of 10 areas per event.'); return; }
  const parentDates = getParentDatesFromForm();
  const newSe = defaultSubEvent(parentDates, existing+1);
  const container = document.getElementById('sub-events-list');
  const div = document.createElement('div');
  div.innerHTML = renderSubEventCard(newSe, existing, parentDates, false);
  container.appendChild(div.firstElementChild);
  updateSubCount();
}

function updateSubCount() {
  const n = document.querySelectorAll('.sub-event-card').length;
  const note = document.getElementById('sub-limit-note');
  if (note) note.textContent = n >= 10 ? 'Maximum of 10 areas reached' : `${n}/10 areas`;
  const addBtn = document.getElementById('add-sub-btn');
  if (addBtn) addBtn.style.display = n >= 10 ? 'none' : 'block';
}

function syncSubDatesFromParent() {
  const pd = getParentDatesFromForm();
  document.querySelectorAll('.sub-event-card').forEach(card => {
    const preIn = card.querySelector('.se-pre');
    const buildIn = card.querySelector('.se-build');
    const brkIn = card.querySelector('.se-brk');
    if (preIn && !preIn.classList.contains('overridden')) preIn.value = pd.pre||'';
    if (buildIn && !buildIn.classList.contains('overridden')) buildIn.value = pd.build||'';
    if (brkIn && !brkIn.classList.contains('overridden')) brkIn.value = pd.brk||'';
  });
}

function readSubEventsFromForm(parentDates) {
  const subEvents = [];
  document.querySelectorAll('.sub-event-card').forEach((card, i) => {
    const showDates = [];
    const starts = card.querySelectorAll('.se-show-s');
    const ends   = card.querySelectorAll('.se-show-e');
    starts.forEach((s,si) => { showDates.push({s:s.value||'', e:ends[si]?.value||''}); });
    subEvents.push({
      id: subUid(),
      name: card.querySelector('.se-name-input')?.value.trim() || 'Area '+(i+1),
      service_type: card.querySelector('.se-type-select')?.value || '',
      responsibility: card.querySelector('.se-resp')?.value.trim() || '',
      customers: card.querySelector('.se-cust')?.value || '',
      pre:   card.querySelector('.se-pre')?.value   || '',
      build: card.querySelector('.se-build')?.value || '',
      show_dates: showDates.length ? showDates : JSON.parse(JSON.stringify(parentDates.show_dates||[{s:'',e:''}])),
      brk:   card.querySelector('.se-brk')?.value   || '',
      notes: card.querySelector('.se-notes')?.value.trim() || '',
    });
  });
  return subEvents;
}

// ── CRUD ──────────────────────────────────────────────────────────────
function saveEvent() {
  const f = getFormData();
  if (!f.name) { alert('Event name is required.'); return; }
  if (!f.build) { alert('Build start date is required.'); return; }
  if (!f.brk) { alert('Break end date is required.'); return; }
  const hasShow = f.show_dates.some(sd => sd.s && sd.e);
  if (!hasShow) { alert('At least one show start and end date is required.'); return; }

  if (editingId) {
    const idx = events.findIndex(e => e.id === editingId);
    if (idx >= 0) events[idx] = {...events[idx], ...f};
  } else {
    events.push({id: uid(), ...f});
  }
  sortEvents();
  closeModal();
  render();
  const saved = editingId || events[events.length-1].id;
  showPanel('ev-'+saved, null);
}

function deleteEvent(id) {
  if (!confirm('Delete this event?')) return;
  events = events.filter(e => e.id !== id);
  closeModal();
  sortEvents();
  render();
  showPanel('overview', document.getElementById('tab-overview'));
}

function sortEvents() {
  events.sort((a,b) => {
    const fa = a.show_dates?.[0]?.s || a.build || '9999';
    const fb = b.show_dates?.[0]?.s || b.build || '9999';
    return fa.localeCompare(fb);
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────
function showPanel(panelId, clickedEl) {
  activePanel = panelId;
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.panel === panelId);
  });
  if (clickedEl) clickedEl.classList.add('active');

  const content = document.getElementById('content');
  if (panelId === 'overview') {
    renderOverviewPanel(content);
  } else if (panelId.startsWith('ev-')) {
    renderEventPanel(content, panelId.slice(3));
  } else if (panelId.startsWith('kit-')) {
    renderKitPanel(content, panelId.slice(4));
  } else if (panelId.startsWith('build-')) {
    renderBuildPanel(content, panelId.slice(6));
  } else if (panelId === 'inventory') {
    renderInventoryPanel(content);
  } else if (panelId === 'master') {
    renderMasterPanel(content);
  }
}

// ── GANTT ─────────────────────────────────────────────────────────────
function buildGanttHTML() {
  if (!events.length) return '<div class="gantt-empty">No events yet — click <strong>+ Add event</strong> to begin.</div>';

  const allD = events.flatMap(ev => [
    p(ev.pre), p(ev.build), p(ev.brk),
    ...(ev.show_dates||[]).flatMap(sd => [p(sd.s), p(sd.e)])
  ].filter(Boolean));
  if (!allD.length) return '<div class="gantt-empty">Add dates to see the Gantt.</div>';

  const minD = addD(new Date(Math.min(...allD)), -3);
  const maxD = addD(new Date(Math.max(...allD)), 3);
  const totalDays = Math.round((maxD - minD) / 86400000) + 1;
  const NW=162, CW=48, GW=620, TW=NW+CW+GW;
  const RH=30, SRH=22, MH=20, HH=20;
  const totalRows = events.reduce((a,ev)=>a+1+(ev.sub_events&&ev.sub_events.length?ev.sub_events.length:0),0);
  const H = MH + HH + totalRows * RH + 6;

  function xf(d) { return NW+CW+(d-minD)/86400000/totalDays*GW; }
  function wf(s,e) { return Math.max(2,(e-s)/86400000/totalDays*GW); }

  const months = [];
  let mc = new Date(minD.getFullYear(), minD.getMonth(), 1);
  while (mc <= maxD) { months.push(new Date(mc)); mc = new Date(mc.getFullYear(), mc.getMonth()+1, 1); }

  let svg = `<svg width="${TW}" height="${H}" viewBox="0 0 ${TW} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;font-family:'DM Sans',sans-serif">`;

  months.forEach((m, mi) => {
    const ms = new Date(Math.max(+m, +minD));
    const me = new Date(Math.min(+(new Date(m.getFullYear(), m.getMonth()+1, 0)), +maxD));
    const mx = xf(ms), mw = wf(ms, addD(me,1));
    svg += `<rect x="${mx}" y="0" width="${mw}" height="${MH}" fill="${mi%2===0?'#023146':'#034a6b'}"/>`;
    svg += `<text x="${mx+mw/2}" y="${MH*.7}" text-anchor="middle" font-size="10" font-weight="500" fill="white">${m.toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</text>`;
    svg += `<line x1="${mx}" y1="0" x2="${mx}" y2="${H}" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>`;
  });

  svg += `<rect x="0" y="${MH}" width="${TW}" height="${HH}" fill="#EFF2F4"/>`;
  svg += `<text x="10" y="${MH+HH*.7}" font-size="10" font-weight="500" fill="#023146">Event</text>`;
  svg += `<text x="${NW+5}" y="${MH+HH*.7}" font-size="10" font-weight="500" fill="#023146">Code</text>`;

  let wd = new Date(minD);
  while (wd <= maxD) {
    if (wd.getDay() === 1) {
      const dx = xf(wd);
      svg += `<line x1="${dx}" y1="${MH}" x2="${dx}" y2="${H}" stroke="#E0E0E0" stroke-width="0.4"/>`;
      svg += `<text x="${dx+2}" y="${MH+HH*.7}" font-size="8" fill="#AAAAAA">${wd.getDate()}</text>`;
    }
    wd = addD(wd, 1);
  }
  svg += `<line x1="${NW}" y1="${MH}" x2="${NW}" y2="${H}" stroke="#E0E0E0" stroke-width="0.5"/>`;
  svg += `<line x1="${NW+CW}" y1="${MH}" x2="${NW+CW}" y2="${H}" stroke="#E0E0E0" stroke-width="0.5"/>`;

  const overlaps = detectOverlaps();
  const overlapNames = new Set(overlaps.flatMap(o => [o.a, o.b]));

  let rowIdx = 0;
  events.forEach((ev, i) => {
    const ry = MH + HH + rowIdx * RH;
    const bg = i%2===0 ? '#F9F9F9' : '#FFFFFF';
    svg += `<rect x="0" y="${ry}" width="${TW}" height="${RH}" fill="${bg}"/>`;
    if (overlapNames.has(ev.name)) svg += `<rect x="0" y="${ry}" width="3" height="${RH}" fill="#F5D47A"/>`;
    svg += `<rect x="0" y="${ry+RH-0.5}" width="${TW}" height="0.5" fill="#EEEEEE"/>`;
    const nm = ev.name.length > 22 ? ev.name.slice(0,21)+'…' : ev.name;
    svg += `<text x="10" y="${ry+RH*.65}" font-size="11" font-weight="500" fill="#1A1A1A">${esc(nm)}</text>`;
    svg += `<text x="${NW+5}" y="${ry+RH*.65}" font-size="10" fill="#888">${esc(ev.code||'—')}</text>`;

    const bh = RH * 0.52, by = ry + (RH - bh) / 2;

    function seg(s, e, col) {
      if (!s||!e||s>e) return;
      const sx = xf(s), sw = Math.max(2, wf(s, addD(e,1)));
      svg += `<rect x="${sx.toFixed(1)}" y="${by.toFixed(1)}" width="${sw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="${col}"/>`;
    }

    // Pre-build bar
    const prebuild = p(ev.pre), build = p(ev.build);
    const firstShow = p(ev.show_dates?.[0]?.s);
    const lastShow = p(ev.show_dates?.[ev.show_dates.length-1]?.e);
    const brk = p(ev.brk);

    if (prebuild && build) seg(prebuild, addD(build,-1), PRE);
    // Build bar: build → day before first show
    if (build && firstShow) seg(build, addD(firstShow,-1), BUILD);
    else if (build && lastShow) seg(build, lastShow, BUILD);

    // Show windows — each as a separate pink bar
    (ev.show_dates||[]).forEach(sd => {
      const ss = p(sd.s), se = p(sd.e);
      if (ss && se) {
        seg(ss, se, SHOW);
        const sw = wf(ss, addD(se,1));
        if (sw > 14) {
          svg += `<text x="${(xf(ss)+sw/2).toFixed(1)}" y="${(by+bh*.72).toFixed(1)}" text-anchor="middle" font-size="8" font-weight="500" fill="white">${esc(ev.code||'')}</text>`;
        }
      }
    });

    // Break bar
    if (lastShow && brk) seg(addD(lastShow,1), brk, BRK);

    // Month lines
    months.slice(1).forEach(m => {
      const mx = xf(new Date(m.getFullYear(), m.getMonth(), 1));
      svg += `<line x1="${mx}" y1="${ry}" x2="${mx}" y2="${ry+RH}" stroke="#ddd" stroke-width="0.3"/>`;
    });
    rowIdx++;

    // Sub-event rows
    if (ev.sub_events && ev.sub_events.length) {
      const seColors = ['#DF5C7D','#5B8DB8','#E07B4A','#5BA87A','#9B59B6','#1ABC9C','#E74C3C','#F39C12','#3498DB','#E91E63'];
      ev.sub_events.forEach((se, si) => {
        const sry = MH + HH + rowIdx * RH;
        const sebg = '#FAFAF8';
        svg += `<rect x="0" y="${sry}" width="${TW}" height="${RH}" fill="${sebg}"/>`;
        svg += `<rect x="0" y="${sry+RH-0.5}" width="${TW}" height="0.5" fill="#EEEEEE"/>`;
        svg += `<rect x="0" y="${sry}" width="3" height="${RH}" fill="${seColors[si%10]}"/>`;
        svg += `<rect x="20" y="${sry}" width="3" height="${RH}" fill="${seColors[si%10]}" opacity="0.4"/>`;
        const senm = se.name.length>20 ? se.name.slice(0,19)+'…' : se.name;
        svg += `<text x="28" y="${sry+RH*.65}" font-size="10" fill="#555" font-family="'DM Sans',sans-serif">${esc(senm)}</text>`;
        svg += `<text x="${NW+5}" y="${sry+RH*.65}" font-size="9" fill="#aaa" font-family="'DM Sans',sans-serif">${esc(se.service_type||'')}</text>`;
        const sebh = RH * 0.45, seby = sry + (RH - sebh) / 2;
        function subSeg(s,e,col) {
          if(!s||!e||s>e) return;
          const sx=xf(s),sw=Math.max(2,wf(s,addD(e,1)));
          svg += `<rect x="${sx.toFixed(1)}" y="${seby.toFixed(1)}" width="${sw.toFixed(1)}" height="${sebh.toFixed(1)}" rx="2" fill="${col}" opacity="0.75"/>`;
        }
        const sepre=p(se.pre),sebuild=p(se.build),sebrk=p(se.brk);
        const sefirst=p(se.show_dates?.[0]?.s), selast=p(se.show_dates?.[se.show_dates.length-1]?.e);
        if(sepre&&sebuild) subSeg(sepre,addD(sebuild,-1),PRE);
        if(sebuild&&sefirst) subSeg(sebuild,addD(sefirst,-1),BUILD);
        (se.show_dates||[]).forEach(sd=>{const ss=p(sd.s),se2=p(sd.e);if(ss&&se2)subSeg(ss,se2,SHOW);});
        if(selast&&sebrk) subSeg(addD(selast,1),sebrk,BRK);
        months.slice(1).forEach(m => {
          const mx = xf(new Date(m.getFullYear(), m.getMonth(), 1));
          svg += `<line x1="${mx}" y1="${sry}" x2="${mx}" y2="${sry+RH}" stroke="#ddd" stroke-width="0.3"/>`;
        });
        rowIdx++;
      });
    }
  });

  svg += '</svg>';

  const ov = detectOverlaps();
  const ovHtml = ov.length ? `<div class="overlap-badge"><strong>${ov.length} show overlap${ov.length>1?'s':''}:</strong>&nbsp;${ov.map(o=>esc(o.a)+' &amp; '+esc(o.b)).join(' · ')}</div>` : '';
  return ovHtml + `<div class="gantt-scroll">${svg}</div>`;
}

// ── SIDEBAR ───────────────────────────────────────────────────────────
function renderSidebar() {
  const container = document.getElementById('sidebar-events');
  if (!events.length) {
    container.innerHTML = '<div class="sidebar-empty">No events yet.<br>Click <strong>+ Add event</strong> to begin.</div>';
  } else {
    container.innerHTML = events.map(ev => {
      const firstShow = ev.show_dates?.[0]?.s;
      const dateStr = firstShow ? p(firstShow).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '—';
      const dot = ev.format === 'Day Show' ? '#E07B4A' : '#DF5C7D';
      return `<div class="sidebar-item" data-panel="ev-${ev.id}" onclick="showPanel('ev-${ev.id}',this)">
        <div class="sidebar-dot" style="background:${dot}"></div>
        <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ev.name)}</span>
        <span class="sidebar-meta">${dateStr}</span>
      </div>
      <div class="sidebar-item" data-panel="kit-${ev.id}" onclick="openKitPanel('${ev.id}')" style="padding-left:28px;font-size:11px;color:var(--faint)">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="flex-shrink:0"><rect x="2" y="3" width="12" height="11" rx="1"/><line x1="5" y1="7" x2="11" y2="7"/><line x1="5" y1="10" x2="9" y2="10"/><line x1="5" y1="5" x2="7" y2="5"/></svg>
        Kit list
      </div>
      <div class="sidebar-item" data-panel="build-${ev.id}" onclick="openBuildPanel('${ev.id}')" style="padding-left:28px;font-size:11px;color:var(--faint)">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="flex-shrink:0"><rect x="2" y="2" width="12" height="12" rx="1"/><path d="M5 8h6M8 5v6" stroke-linecap="round"/></svg>
        Build figures
      </div>`;
    }).join('');
  }
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.panel === activePanel);
  });
  document.getElementById('tab-overview').classList.toggle('active', activePanel === 'overview');

  let sd = 0, allDts = [];
  events.forEach(ev => {
    (ev.show_dates||[]).forEach(s => { const ds=p(s.s),de=p(s.e); if(ds&&de) sd+=diffD(ds,de); });
    [p(ev.pre),p(ev.build),...(ev.show_dates||[]).flatMap(s=>[p(s.s),p(s.e)]),p(ev.brk)].filter(Boolean).forEach(d=>allDts.push(+d));
  });
  document.getElementById('stat-n').textContent = events.length;
  document.getElementById('stat-sd').textContent = sd;
  document.getElementById('stat-sp').textContent = allDts.length > 1 ? Math.round((Math.max(...allDts)-Math.min(...allDts))/86400000)+' days' : '—';

  const ov = detectOverlaps();
  document.getElementById('stat-overlaps').innerHTML = ov.length
    ? `<div class="overlap-warn">${ov.length} show overlap${ov.length>1?'s':''}:<br>${ov.map(o=>esc(o.a)+' &amp; '+esc(o.b)).join('<br>')}</div>` : '';
}

// ── HELPERS ───────────────────────────────────────────────────────────
function detectOverlaps() {
  const res = [];
  for (let i = 0; i < events.length; i++) {
    for (let j = i+1; j < events.length; j++) {
      const a = events[i], b = events[j];
      for (const as of (a.show_dates||[])) {
        for (const bs of (b.show_dates||[])) {
          const ads=p(as.s),ade=p(as.e),bds=p(bs.s),bde=p(bs.e);
          if(ads&&ade&&bds&&bde&&ads<=bde&&bds<=ade) { res.push({a:a.name,b:b.name}); break; }
        }
      }
    }
  }
  return res;
}

function calcSeasonSpan() {
  const allD = events.flatMap(ev => [...(ev.show_dates||[]).flatMap(s=>[p(s.s),p(s.e)]), p(ev.build), p(ev.brk)].filter(Boolean));
  if (allD.length < 2) return '';
  const mn = new Date(Math.min(...allD)), mx = new Date(Math.max(...allD));
  return fmt(mn) + ' – ' + fmt(mx);
}

let kitActiveEvId = null;
let kitActiveSeIdx = null; // null = totals view

function openKitPanel(evId) {
  kitActiveEvId = evId;
  kitActiveSeIdx = null;
  showPanel('kit-'+evId, null);
}

function renderKitPanel(content, evId) {
  const ev = events.find(e => e.id === evId);
  if (!ev) return;
  kitActiveEvId = evId;

  // Build sub-event tabs
  const hasSubs = ev.sub_events && ev.sub_events.length > 0;
  const tabs = [
    `<button class="kit-tab ${kitActiveSeIdx===null?'active':''}" onclick="switchKitTab(null)">Event total</button>`,
    ...(hasSubs ? ev.sub_events.map((se,i) =>
      `<button class="kit-tab ${kitActiveSeIdx===i?'active':''}" onclick="switchKitTab(${i})">${esc(se.name||'Area '+(i+1))}</button>`
    ) : []),
  ];

  content.innerHTML = `
    <div class="kit-panel">
      <div class="kit-header">
        <div>
          <h2>${esc(ev.name)} · Kit list</h2>
          <p>${hasSubs?ev.sub_events.length+' areas · quantities per area, totals rolled up to event':'Single area · input quantities below'}</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" onclick="showPanel('ev-${evId}',null)">← Back to event</button>
          <button class="btn btn-primary btn-sm" onclick="exportKitCSV('${evId}')">Export CSV</button>
        </div>
      </div>
      <div class="kit-tabs">${tabs.join('')}</div>
      <div class="kit-body" id="kit-body-${evId}">
        ${buildKitTable(ev, kitActiveSeIdx)}
      </div>
    </div>`;
}

function switchKitTab(seIdx) {
  kitActiveSeIdx = seIdx;
  const ev = events.find(e => e.id === kitActiveEvId);
  if (!ev) return;
  document.querySelectorAll('.kit-tab').forEach((t,i) => t.classList.toggle('active', i === (seIdx===null?0:seIdx+1)));
  const body = document.getElementById('kit-body-'+kitActiveEvId);
  if (body) body.innerHTML = buildKitTable(ev, seIdx);
}

function buildKitTable(ev, seIdx) {
  const hasSubs = ev.sub_events && ev.sub_events.length > 0;
  const isTotal = seIdx === null;
  const kit = ev.kit = ev.kit || {};

  if (isTotal && hasSubs) {
    // Totals view: show all sub-event columns + total
    const subs = ev.sub_events;
    const colW = Math.max(60, Math.floor(520 / (subs.length + 1)));
    const nameW = 220;
    const totalW = 70;
    const gridCols = `${nameW}px ${subs.map(()=>colW+'px').join(' ')} ${totalW}px`;

    let html = `
      <div style="overflow-x:auto">
        <div class="kit-sticky-head" style="grid-template-columns:${gridCols}">
          <div class="kit-col-head" style="text-align:left;padding-left:20px">Item</div>
          ${subs.map(se=>`<div class="kit-col-head" title="${esc(se.name)}">${esc(se.name.length>12?se.name.slice(0,11)+'…':se.name)}</div>`).join('')}
          <div class="kit-col-head total-head">Total</div>
        </div>
        <div class="kit-scroll-body">`;

    let lastGroupT = null;
    KIT_CATEGORIES.forEach((cat,ci) => {
      const catItems = cat.items;
      const group = cat.group || null;
      if (group && group !== lastGroupT) {
        html += `<div style="background:var(--blue);color:#fff;padding:8px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em">${esc(group)}</div>`;
        lastGroupT = group;
      }
      const catHasQty = catItems.some(item => subs.some(se => {
        const k = se.kit||{};
        return (k[item]||0) > 0;
      }));
      const catDisplayName = cat.group ? cat.name.replace(cat.group + ' — ', '') : cat.name;
      html += `
        <div class="kit-cat-head ${catHasQty?'open':''}" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')" id="kch-t-${ci}" style="${cat.group?'padding-left:24px':''}">
          <span class="kch-name">${esc(catDisplayName)}</span>
          <span class="kch-count">${catItems.length} items</span>
          <span class="kch-chevron">▼</span>
        </div>
        <div class="kit-cat-body ${catHasQty?'open':''}" id="kcb-t-${ci}">`;

      catItems.forEach(item => {
        const subQtys = subs.map(se => parseInt((se.kit||{})[item]||0)||0);
        const total = subQtys.reduce((a,b)=>a+b,0);
        const hasQty = total > 0;
        html += `<div class="kit-item-row" style="grid-template-columns:${gridCols}">
          <div class="kit-item-name ${hasQty?'has-qty':''}">${esc(item)}</div>
          ${subQtys.map((q,si)=>`<div class="kit-qty-cell" style="text-align:center;font-size:12px;font-family:'DM Mono',monospace">${q||''}</div>`).join('')}
          <div class="kit-qty-cell total-cell" style="text-align:center;font-size:12px;font-family:'DM Mono',monospace">${total||''}</div>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div></div>`;
    return html;

  } else {
    // Single area input view (either no subs, or specific sub tab)
    const target = (hasSubs && seIdx !== null) ? ev.sub_events[seIdx] : ev;
    target.kit = target.kit || {};
    const kitKey = hasSubs && seIdx !== null ? `ev.sub_events[${seIdx}].kit` : `ev.kit`;
    const safeEvId = esc(ev.id);
    const gridCols = `1fr 90px`;

    // Count filled items
    const filledCount = ALL_ITEMS.filter(item => (target.kit[item]||0) > 0).length;

    let html = `
      <div class="kit-totals-bar">
        <span class="kt-label">${filledCount > 0 ? filledCount+' items allocated' : 'No items allocated yet'}</span>
        <span style="display:flex;gap:8px">
          <button class="kt-export" onclick="clearKitArea('${safeEvId}',${seIdx})">Clear all</button>
          <button class="kt-export" onclick="saveKitAndRerender('${safeEvId}')">Save kit</button>
        </span>
      </div>
      <div style="overflow-x:auto">
        <div class="kit-sticky-head" style="grid-template-columns:${gridCols}">
          <div class="kit-col-head" style="text-align:left;padding-left:20px">Item</div>
          <div class="kit-col-head total-head">Qty</div>
        </div>
        <div class="kit-scroll-body">`;

    let lastGroup = null;
    KIT_CATEGORIES.forEach((cat,ci) => {
      const group = cat.group || null;
      if (group && group !== lastGroup) {
        const groupHasQty = KIT_CATEGORIES.filter(c => c.group === group).some(c => c.items.some(item => (target.kit[item]||0) > 0));
        html += `<div style="background:var(--blue);color:#fff;padding:8px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:8px">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h10v10H3z M7 3v10M3 7h10" opacity=".6"/></svg>
          ${esc(group)}
        </div>`;
        lastGroup = group;
      }
      const catHasQty = cat.items.some(item => (target.kit[item]||0) > 0);
      const catDisplayName = cat.group ? cat.name.replace(cat.group + ' — ', '') : cat.name;
      html += `
        <div class="kit-cat-head ${catHasQty?'open':''}" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')" style="${cat.group?'padding-left:24px':''}">
          <span class="kch-name">${esc(catDisplayName)}</span>
          <span class="kch-count">${cat.items.length} items</span>
          <span class="kch-chevron">▼</span>
        </div>
        <div class="kit-cat-body ${catHasQty?'open':''}">`;

      cat.items.forEach(item => {
        const qty = target.kit[item] || 0;
        html += `<div class="kit-item-row" style="grid-template-columns:${gridCols}">
          <div class="kit-item-name ${qty?'has-qty':''}">${esc(item)}</div>
          <div class="kit-qty-cell">
            <input type="number" min="0" class="kit-qty-input ${qty?'has-val':''}" 
              value="${qty||''}" 
              placeholder="0"
              data-item="${esc(item)}"
              data-evid="${safeEvId}"
              data-seidx="${seIdx}"
              onchange="updateKitQty(this)"
              oninput="this.classList.toggle('has-val',this.value>0)">
          </div>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div></div>
      <div class="kit-add-note">Changes save automatically when you move between fields. Use the Save kit button to confirm all changes.</div>`;
    return html;
  }
}

function updateKitQty(input) {
  const evId = input.dataset.evid;
  const seIdx = input.dataset.seidx === 'null' ? null : parseInt(input.dataset.seidx);
  const item = input.dataset.item;
  const qty = parseInt(input.value) || 0;
  const ev = events.find(e => e.id === evId);
  if (!ev) return;
  const target = (ev.sub_events && seIdx !== null) ? ev.sub_events[seIdx] : ev;
  target.kit = target.kit || {};
  if (qty > 0) target.kit[item] = qty;
  else delete target.kit[item];
  input.classList.toggle('has-val', qty > 0);
  // Update item name highlight
  const nameEl = input.closest('.kit-item-row')?.querySelector('.kit-item-name');
  if (nameEl) nameEl.classList.toggle('has-qty', qty > 0);
}

function saveKitAndRerender(evId) {
  // Kit is saved in memory — just refresh totals bar
  const ev = events.find(e => e.id === evId);
  if (!ev) return;
  const body = document.getElementById('kit-body-'+evId);
  if (body) {
    const totalBar = body.querySelector('.kit-totals-bar .kt-label');
    if (totalBar) {
      const target = (ev.sub_events && kitActiveSeIdx !== null) ? ev.sub_events[kitActiveSeIdx] : ev;
      target.kit = target.kit || {};
      const count = ALL_ITEMS.filter(item => (target.kit[item]||0) > 0).length;
      totalBar.textContent = count + ' items allocated';
    }
  }
}

function clearKitArea(evId, seIdx) {
  if (!confirm('Clear all quantities for this area?')) return;
  const ev = events.find(e => e.id === evId);
  if (!ev) return;
  const target = (ev.sub_events && seIdx !== null) ? ev.sub_events[seIdx] : ev;
  target.kit = {};
  renderKitPanel(document.getElementById('content'), evId);
}

function getKitTotals(ev) {
  // Return merged kit: if sub_events exist sum them, else use ev.kit
  const totals = {};
  if (ev.sub_events && ev.sub_events.length) {
    ev.sub_events.forEach(se => {
      Object.entries(se.kit||{}).forEach(([k,v]) => {
        totals[k] = (totals[k]||0) + (parseInt(v)||0);
      });
    });
  } else {
    Object.assign(totals, ev.kit||{});
  }
  return totals;
}

function exportKitCSV(evId) {
  const ev = events.find(e => e.id === evId);
  if (!ev) return;
  const hasSubs = ev.sub_events && ev.sub_events.length > 0;
  let csv = '';
  if (hasSubs) {
    const headers = ['Category','Item', ...ev.sub_events.map(se=>se.name||'Area'), 'Total'];
    csv = headers.join(',') + '\n';
    KIT_CATEGORIES.forEach(cat => {
      cat.items.forEach(item => {
        const subQtys = ev.sub_events.map(se => parseInt((se.kit||{})[item]||0)||0);
        const total = subQtys.reduce((a,b)=>a+b,0);
        if (total > 0) {
          csv += [cat.name, '"'+item+'"', ...subQtys, total].join(',') + '\n';
        }
      });
    });
  } else {
    csv = 'Category,Item,Quantity\n';
    KIT_CATEGORIES.forEach(cat => {
      cat.items.forEach(item => {
        const qty = (ev.kit||{})[item];
        if (qty > 0) csv += [cat.name, '"'+item+'"', qty].join(',') + '\n';
      });
    });
  }
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url;
  a.download = ev.name.replace(/[^a-z0-9]/gi,'_')+'_kit.csv';
  a.click(); URL.revokeObjectURL(url);
}

function switchBuildTab(seIdx) {
  buildActiveSeIdx = seIdx;

  document.querySelectorAll('.kit-tab').forEach((t,i) => t.classList.toggle('active', i === (seIdx===null?0:seIdx+1)));

function calcRevenue(qty, price) {
  const q = parseInt(qty)||0;
  const p = parseFloat(price)||0;
  return q * p;
}

function fmtGBP(val) {
  if (!val) return '';
  return '£' + val.toLocaleString('en-GB', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function updateProductField(input) {
  const evId = input.dataset.evid;
  const seIdx = input.dataset.seidx === 'null' ? null : parseInt(input.dataset.seidx);
  const item = input.dataset.item;
  const field = input.dataset.field;
  const ev = events.find(e => e.id === evId);
  if (!ev) return;
  const target = (ev.sub_events && seIdx !== null) ? ev.sub_events[seIdx] : ev;
  target.products = target.products || {};
  target.products[item] = target.products[item] || {};
  const val = field === 'qty' ? (parseInt(input.value)||0) : (parseFloat(input.value)||0);
  if (val > 0) target.products[item][field] = val;
  else { delete target.products[item][field]; if (!Object.keys(target.products[item]).length) delete target.products[item]; }
  // Update revenue cell
  const pd = target.products[item] || {};
  const rev = calcRevenue(pd.qty, pd.price);
  const row = input.closest('.kit-item-row');
  const revCell = row?.querySelector('.prod-rev-cell');
  if (revCell) revCell.textContent = rev ? fmtGBP(rev) : '';
  // Update summary bar
  const areaTotal = ALL_PRODUCTS.reduce((acc,it)=>{const p=(target.products[it]||{}); return acc+calcRevenue(p.qty,p.price);},0);
  const filledCount = ALL_PRODUCTS.filter(it=>(target.products[it]?.qty||0)>0).length;
  const revSummary = document.querySelector('.rev-summary .rs-val');
  if (revSummary) revSummary.textContent = fmtGBP(areaTotal)||'£0';
  const revLabel = document.querySelector('.rev-summary .rs-item');
  if (revLabel) revLabel.innerHTML = `${filledCount} products · Revenue forecast <span class="rs-val">${fmtGBP(areaTotal)||'£0'}</span>`;
  input.classList.toggle('has-val', (parseInt(input.value)||0) > 0);
}

function clearBuildArea(evId, seIdx) {
  if (!confirm('Clear all build figures for this area?')) return;
  const ev = events.find(e => e.id === evId);
  if (!ev) return;
  const target = (ev.sub_events && seIdx !== null) ? ev.sub_events[seIdx] : ev;
  target.products = {};
  target.infra = {};
  renderBuildPanel(document.getElementById('content'), evId);
}

function getProductTotals(ev) {
  const totals = {};
  if (ev.sub_events && ev.sub_events.length) {
    ev.sub_events.forEach(se => {
      Object.entries(se.products||{}).forEach(([k,v]) => {
        totals[k] = totals[k] || {qty:0, price: v.price||0};
        totals[k].qty += (parseInt(v.qty)||0);
      });
    });
  } else {
    Object.assign(totals, ev.products||{});
  }
  return totals;
}

function exportBuildCSV(evId) {
  const ev = events.find(e => e.id === evId);
  if (!ev) return;
  const hasSubs = ev.sub_events && ev.sub_events.length > 0;
  let csv = '';
  if (hasSubs) {
    csv = ['Category','Product',...ev.sub_events.map(se=>se.name+' Qty'),...ev.sub_events.map(se=>se.name+' Rev'),'Total Revenue'].join(',')+'\n';
    PRODUCT_CATEGORIES.forEach(cat => {
      cat.items.forEach(item => {
        const subQtys = ev.sub_events.map(se => (se.products||{})[item]?.qty||0);
        const subRevs = ev.sub_events.map(se => { const pd=(se.products||{})[item]||{}; return calcRevenue(pd.qty,pd.price); });
        const total = subRevs.reduce((a,b)=>a+b,0);
        if (total > 0 || subQtys.some(q=>q>0)) {
          csv += [cat.name,'"'+item+'"',...subQtys,...subRevs.map(r=>r?r.toFixed(2):'')].join(',')+'\n';
        }
      });
    });
  } else {
    csv = 'Category,Product,Qty,Unit Price,Revenue\n';
    PRODUCT_CATEGORIES.forEach(cat => {
      cat.items.forEach(item => {
        const pd = (ev.products||{})[item];
        if (pd && pd.qty > 0) {
          csv += [cat.name,'"'+item+'"',pd.qty,pd.price||0,calcRevenue(pd.qty,pd.price).toFixed(2)].join(',')+'\n';
        }
      });
    });
  }
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download = ev.name.replace(/[^a-z0-9]/gi,'_')+'_products.csv';
  a.click();
}

          const usedIn = ALL_PRODUCTS.filter(prod => (productRecipes[prod]||{})[item] > 0);
          const cost = inventoryCosts[item] || '';
          return `<div class="inv-row" style="grid-template-columns:1fr 130px 90px 90px">
            <span>${esc(item)}</span>
            <span>${usedIn.length > 0 ? usedIn.slice(0,2).map(p=>`<span class="inv-badge">${esc(p.split(' ').slice(0,3).join(' '))}</span>`).join(' ') + (usedIn.length>2?` <span class="inv-badge">+${usedIn.length-2}</span>`:''): '<span style="color:var(--faint);font-size:11px">Not mapped</span>'}</span>
            <span style="text-align:right;font-family:DM Mono,monospace;font-size:12px;color:${usedIn.length?'var(--blue)':'var(--faint)'}">${usedIn.length||''}</span>
            <span style="text-align:right;padding-right:8px">
              <input type="number" step="0.01" min="0"
                value="${cost||''}"
                placeholder="£ cost"
                data-inv="${esc(item)}"
                style="width:80px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:DM Mono,monospace;text-align:right"
                onchange="updateInventoryCost(this)">
            </span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

let recipeModalProduct = null;

function openRecipeEditor(productName) {
  recipeModalProduct = productName;
  const recipe = productRecipes[productName] || {};
  const filledCount = Object.keys(recipe).length;

  // Group inventory into sections
  const sections = [
    { name: "Tent shell", items: TENT_INVENTORY.slice(0, 26) },
    { name: "Mattresses & bedding", items: TENT_INVENTORY.slice(26, 31) },
    { name: "Décor & accessories", items: TENT_INVENTORY.slice(31, 36) },
    { name: "Carpets & flooring", items: TENT_INVENTORY.slice(36, 46) },
    { name: "Kits & sets", items: TENT_INVENTORY.slice(46, 54) },
    { name: "Furniture", items: TENT_INVENTORY.slice(54) },
  ];

  document.getElementById('modal-title').textContent = 'Recipe: ' + productName;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-body').innerHTML = `
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Enter how many of each inventory item is needed per unit sold of this product.</p>
    ${filledCount > 0 ? `<div style="background:var(--blue-light);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--blue);margin-bottom:12px">${filledCount} items mapped · ${Object.entries(recipe).map(([k,v])=>`${v}× ${k}`).join(', ')}</div>` : ''}
    <div class="recipe-grid" id="recipe-grid">
      ${sections.map(sec => `
        <div class="recipe-section-head">${esc(sec.name)}</div>
        ${sec.items.map(item => {
          const qty = recipe[item] || 0;
          return `<div class="recipe-item-name ${qty?'has-val':''}" id="rn-${esc(item).replace(/[^a-z0-9]/gi,'_')}">${esc(item)}</div>
          <div class="recipe-qty-cell">
            <input type="number" min="0" class="recipe-qty-input ${qty?'has-val':''}"
              value="${qty||''}" placeholder="—"
              data-item="${esc(item)}"
              onchange="updateRecipeQty(this)"
              oninput="this.classList.toggle('has-val',this.value>0)">
          </div>`;
        }).join('')}
      `).join('')}
    </div>`;

  document.getElementById('modal-foot').innerHTML = `
    <button class="btn btn-primary" onclick="saveRecipe()">Save recipe</button>
    <button class="btn btn-danger btn-sm" onclick="clearRecipe()">Clear all</button>
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>`;
}

function updateRecipeQty(input) {
  const item = input.dataset.item;
  const qty = parseInt(input.value) || 0;
  if (!productRecipes[recipeModalProduct]) productRecipes[recipeModalProduct] = {};
  if (qty > 0) productRecipes[recipeModalProduct][item] = qty;
  else delete productRecipes[recipeModalProduct][item];
  // Highlight row
  const nameEl = document.getElementById('rn-'+item.replace(/[^a-z0-9]/gi,'_'));
  if (nameEl) nameEl.classList.toggle('has-val', qty > 0);
  input.classList.toggle('has-val', qty > 0);
}

function saveRecipe() {
  // Already saved in memory via updateRecipeQty — just close
  closeModal();
  // If we're on a product panel, refresh it
  if (activePanel && activePanel.startsWith('build-')) {
    renderBuildPanel(document.getElementById('content'), activePanel.slice(5));
  }
}

function clearRecipe() {
  if (!confirm('Clear this recipe?')) return;
  delete productRecipes[recipeModalProduct];
  closeModal();
}

// Calculate total inventory needed for an event based on products sold
function calcInventoryNeeds(ev) {
  const needs = {};
  const hasSubs = ev.sub_events && ev.sub_events.length > 0;
  const targets = hasSubs ? ev.sub_events : [ev];

  targets.forEach(target => {
    ALL_PRODUCTS.forEach(product => {
      const pd = (target.products || {})[product];
      const qty = parseInt(pd?.qty) || 0;
      if (qty === 0) return;
      const recipe = productRecipes[product] || {};
      Object.entries(recipe).forEach(([invItem, recipeQty]) => {
        needs[invItem] = (needs[invItem] || 0) + qty * recipeQty;
      });
    });
  });
  return needs;
}

function buildMasterRows(products, colWidths) {
  return products.map(product => {
    const m = PRODUCT_MASTER[product] || {};
    const hasRecipe = Object.keys(productRecipes[product]||{}).length > 0;
    const totalCost = calcTotalProductCost(product);
    const recipe = productRecipes[product] || {};
    const recipeCount = Object.keys(recipe).length;

    function cell(val, extraClass='') {
      const empty = val === '' || val === undefined || val === null;
      return `<div class="master-cell ${empty?'empty-cell':''} ${extraClass}">${empty ? '—' : esc(String(val))}</div>`;
    }

    return `<div class="master-row" style="grid-template-columns:${colWidths}" id="mrow-${esc(product).replace(/[^a-z0-9]/gi,'_')}">
      <div class="master-cell name-cell" onclick="openProductEditor('${esc(product)}')" title="${esc(product)}">
        ${esc(product.length>38?product.slice(0,37)+'…':product)}
        ${recipeCount>0?`<span style="margin-left:4px;font-size:10px;color:var(--pink);font-weight:600">${recipeCount}✓</span>`:''}
      </div>
      ${cell(m.occupancy)}
      ${cell(m.build_mins)}
      ${cell(m.break_mins)}
      ${cell(m.hire_cost!==''?'£'+Number(m.hire_cost).toLocaleString():'')}
      ${cell(m.tent_type)}
      ${cell(m.sqm!==''?m.sqm+'m²':'')}
      ${cell(m.linen_cost!==''?'£'+Number(m.linen_cost).toLocaleString():'')}
      ${cell(m.accessory_cost!==''?'£'+Number(m.accessory_cost).toLocaleString():'')}
      ${cell(m.transport_volume)}
      <div class="master-cell ${totalCost>0?'auto-cell':'empty-cell'}">${totalCost>0?'£'+totalCost.toLocaleString():'—'}</div>
    </div>`;
  }).join('');
}

function filterMasterTable() {
  const search = document.getElementById('master-search')?.value.toLowerCase() || '';
  const tentFilter = document.getElementById('master-filter-tent')?.value || '';
  const recipeFilter = document.getElementById('master-filter-recipe')?.value || '';

  const filtered = ALL_PRODUCTS.filter(p => {
    const m = PRODUCT_MASTER[p] || {};
    const matchSearch = !search || p.toLowerCase().includes(search);
    const matchTent = !tentFilter || m.tent_type === tentFilter;
    const hasRecipe = Object.keys(productRecipes[p]||{}).length > 0;
    const matchRecipe = !recipeFilter || (recipeFilter==='yes' ? hasRecipe : !hasRecipe);
    return matchSearch && matchTent && matchRecipe;
  });

  const colWidths = '280px 60px 75px 75px 80px 140px 55px 80px 80px 90px 100px';
  const body = document.getElementById('master-table-body');
  if (body) body.innerHTML = buildMasterRows(filtered, colWidths);
}

function calcTotalProductCost(product) {
  const recipe = productRecipes[product] || {};
  let total = 0;
  Object.entries(recipe).forEach(([invItem, qty]) => {
    const unitCost = inventoryCosts[invItem] || 0;
    total += qty * unitCost;
  });
  return Math.round(total * 100) / 100;
}

function exportMasterCSV() {
  const headers = ['Product','Occupancy','Build Minutes','Break Minutes','Hire Cost','Tent Type','SQM','Linen Cost','Accessory Cost','Transport Volume','Total Product Cost','Recipe Items'];
  let csv = headers.join(',') + '\n';
  ALL_PRODUCTS.forEach(product => {
    const m = PRODUCT_MASTER[product] || {};
    const totalCost = calcTotalProductCost(product);
    const recipe = Object.entries(productRecipes[product]||{}).map(([k,v])=>v+'x '+k).join('; ');
    const row = [
      '"'+product+'"',
      m.occupancy||'',
      m.build_mins||'',
      m.break_mins||'',
      m.hire_cost||'',
      '"'+(m.tent_type||'')+'"',
      m.sqm||'',
      m.linen_cost||'',
      m.accessory_cost||'',
      m.transport_volume||'',
      totalCost||'',
      '"'+recipe+'"',
    ];
    csv += row.join(',') + '\n';
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download = 'pink_moon_master_products.csv'; a.click();
}

function updateInventoryCost(input) {
  const item = input.dataset.inv;
  const cost = parseFloat(input.value) || 0;
  if (cost > 0) inventoryCosts[item] = cost;
  else delete inventoryCosts[item];
}

    ? ev.sub_events[seIdx].name
    : 'Event total';

  document.getElementById('modal-title').textContent = `Import CSV — ${esc(ev?.name||'')} · ${areaName}`;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-body').innerHTML = `
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">
      Upload a CSV with columns: <strong>Item, Qty</strong> (and optionally <strong>Price</strong> for products).<br>
      Names must match exactly. Unmatched rows will be flagged.
    </p>
    <div class="import-drop-zone" id="import-drop-zone"
      onclick="document.getElementById('csv-file-input').click()"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="handleCSVDrop(event,'${evId}',${seIdx})">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      <p><strong>Click to browse</strong> or drag & drop your CSV here</p>
      <p style="font-size:11px;margin-top:4px">Accepts .csv files</p>
    </div>
    <input type="file" id="csv-file-input" accept=".csv" style="display:none"
      onchange="handleCSVFile(this,'${evId}',${seIdx})">
    <div id="import-results"></div>

    <div style="margin-top:14px;padding:10px 12px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--muted)">
      <strong>CSV format example:</strong><br>
      <code style="font-family:'DM Mono',monospace;font-size:11px">
        Item,Qty,Price<br>
        1 Person Super Classic Bell,45,350<br>
        Showers (3 Bay),2,<br>

function handleCSVDrop(event, evId, seIdx) {
  event.preventDefault();
  document.getElementById('import-drop-zone').classList.remove('dragover');
  const file = event.dataTransfer.files[0];
  if (file) parseAndImportCSV(file, evId, seIdx);
}

function handleCSVFile(input, evId, seIdx) {
  const file = input.files[0];
  if (file) parseAndImportCSV(file, evId, seIdx);
}

function parseAndImportCSV(file, evId, seIdx) {
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    importCSVData(text, evId, seIdx === 'null' ? null : parseInt(seIdx));
  };
  reader.readAsText(file);
}

function importCSVData(csvText, evId, seIdx) {
  const ev = events.find(e => e.id === evId);
  if (!ev) return;
  const target = (ev.sub_events && seIdx !== null) ? ev.sub_events[seIdx] : ev;
  target.products = target.products || {};
  target.infra    = target.infra    || {};

  // Parse CSV
  const lines = csvText.trim().split(/\r?\n/);
  if (lines.length < 2) { showImportResults([], [], []); return; }

  // Detect header
  const headerLine = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/['"]/g,''));
  const itemCol  = headerLine.findIndex(h => ['item','product','name'].includes(h));
  const qtyCol   = headerLine.findIndex(h => ['qty','quantity'].includes(h));
  const priceCol = headerLine.findIndex(h => ['price','unit price','unit_price'].includes(h));
  if (itemCol < 0 || qtyCol < 0) {
    document.getElementById('import-results').innerHTML = `<div style="color:#C0392B;font-size:13px;margin-top:8px">⚠ Could not find Item and Qty columns. Check your CSV headers.</div>`;
    return;
  }

  // Build lookup maps (normalised)
  const normalise = s => s.toLowerCase().trim().replace(/\s+/g,' ');
  const productMap = {};
  ALL_PRODUCTS.forEach(p => { productMap[normalise(p)] = p; });
  const infraMap = {};
  ALL_INFRA_ITEMS.forEach(i => { infraMap[normalise(i)] = i; });

  const ok = [], warned = [], errors = [];

  lines.slice(1).forEach((line, li) => {
    if (!line.trim()) return;
    // Handle quoted fields
    const cols = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|(?<=,)$|^(?=,))/g) || line.split(',');
    const clean = c => (c||'').trim().replace(/^"|"$/g,'');
    const itemName = clean(cols[itemCol]);
    const qty = parseInt(clean(cols[qtyCol]))||0;
    const price = priceCol >= 0 ? parseFloat(clean(cols[priceCol]))||0 : 0;
    if (!itemName) return;

    const normName = normalise(itemName);
    if (productMap[normName]) {
      const canonical = productMap[normName];
      if (!target.products[canonical]) target.products[canonical] = {};
      if (qty > 0) target.products[canonical].qty = qty;
      if (price > 0) target.products[canonical].price = price;
      ok.push({item: canonical, type: 'product', qty, price});
    } else if (infraMap[normName]) {
      const canonical = infraMap[normName];
      if (qty > 0) target.infra[canonical] = qty;
      ok.push({item: canonical, type: 'infra', qty});
    } else {
      errors.push({item: itemName, qty});
    }
  });

  showImportResults(ok, warned, errors);

  // Refresh the build panel
  const content = document.getElementById('content');
  renderBuildPanel(content, evId);
  // Re-open import modal to show results
  openImportModal(evId, seIdx);
  setTimeout(() => {
    const resultsEl = document.getElementById('import-results');
    if (resultsEl) showImportResultsInEl(resultsEl, ok, warned, errors);
  }, 50);
}

function showImportResults(ok, warned, errors) {}

function showImportResultsInEl(el, ok, warned, errors) {
  if (!ok.length && !errors.length) return;
  let html = `<div class="import-results">
    <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">
      Import results: <span style="color:#1A6B3A">${ok.length} matched</span>${errors.length?` · <span style="color:#C0392B">${errors.length} unmatched</span>`:''}
    </div>`;
  ok.slice(0,10).forEach(r => {
    html += `<div class="import-result-row">
      <span class="import-badge ok">✓</span>
      <span class="import-ok">${esc(r.item)}</span>
      <span style="margin-left:auto;color:var(--muted);font-family:DM Mono,monospace;font-size:11px">${r.qty}${r.price?' · £'+r.price:''}</span>
    </div>`;
  });
  if (ok.length > 10) html += `<div style="font-size:11px;color:var(--faint);padding:4px 0">+ ${ok.length-10} more matched rows</div>`;
  errors.forEach(r => {
    html += `<div class="import-result-row">
      <span class="import-badge err">✗</span>
      <span class="import-err">${esc(r.item)}</span>
      <span style="margin-left:auto;color:var(--faint);font-size:11px">No match found</span>
    </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

function updateInfraQty(input) {
  const evId = input.dataset.evid;
  const seIdx = input.dataset.seidx === 'null' ? null : parseInt(input.dataset.seidx);
  const item = input.dataset.item;
  const qty = parseInt(input.value) || 0;
  const ev = events.find(e => e.id === evId);
  if (!ev) return;
  const target = (ev.sub_events && seIdx !== null) ? ev.sub_events[seIdx] : ev;
  target.infra = target.infra || {};
  if (qty > 0) target.infra[item] = qty;
  else delete target.infra[item];
  input.classList.toggle('has-val', qty > 0);
  const nameEl = input.closest('.kit-item-row')?.querySelector('.kit-item-name');
  if (nameEl) nameEl.classList.toggle('has-qty', qty > 0);
}
