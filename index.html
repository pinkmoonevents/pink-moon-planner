// Lightweight Supabase client (no npm needed)
const sb = {
  headers: {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  },

  async query(table, params='') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {headers: this.headers});
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },

  async insert(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST', headers: this.headers, body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },

  async update(table, id, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH', headers: this.headers, body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },

  async upsert(table, data, onConflict='') {
    const headers = {...this.headers, 'Prefer': 'resolution=merge-duplicates,return=representation'};
    const url = `${SUPABASE_URL}/rest/v1/${table}${onConflict?'?on_conflict='+onConflict:''}`;
    const r = await fetch(url, {method: 'POST', headers, body: JSON.stringify(data)});
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },

  async delete(table, id) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE', headers: this.headers
    });
    if (!r.ok) throw new Error(await r.text());
    return true;
  },

  // Auth
  async signIn(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: {'apikey': SUPABASE_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error_description || data.error);
    this.setSession(data);
    return data;
  },

  async signUp(email, password, name) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: {'apikey': SUPABASE_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({email, password, data: {name}})
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error_description || data.error);
    return data;
  },

  async signOut() {
    const token = localStorage.getItem('pm_token');
    if (token) {
      await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
        method: 'POST',
        headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token}
      });
    }
    localStorage.removeItem('pm_token');
    localStorage.removeItem('pm_user');
    this.headers['Authorization'] = 'Bearer ' + SUPABASE_KEY;
    currentUser = null;
  },

  setSession(data) {
    localStorage.setItem('pm_token', data.access_token);
    localStorage.setItem('pm_user', JSON.stringify(data.user));
    this.headers['Authorization'] = 'Bearer ' + data.access_token;
  },

  getSession() {
    const token = localStorage.getItem('pm_token');
    const user = localStorage.getItem('pm_user');
    if (token && user && user !== 'undefined') {
      try {
        this.headers['Authorization'] = 'Bearer ' + token;
        return { token, user: JSON.parse(user) };
      } catch(e) {
        localStorage.removeItem('pm_token');
        localStorage.removeItem('pm_user');
        return null;
      }
    }
    return null;
  },

  // Realtime subscription via polling (simple, no websocket needed)
  subscriptions: {},
  startPolling(table, callback, intervalMs=5000) {
    if (this.subscriptions[table]) return;
    this.subscriptions[table] = setInterval(async () => {
      try { callback(await this.query(table, '?order=updated_at.desc&limit=100')); } catch(e) {}
    }, intervalMs);
  },
  stopPolling(table) {
    if (this.subscriptions[table]) { clearInterval(this.subscriptions[table]); delete this.subscriptions[table]; }
  }
};

async function doSignIn() {
  const email = document.getElementById('login-email')?.value?.trim();
  const password = document.getElementById('login-password')?.value;
  const errEl = document.getElementById('auth-error');
  if (!email || !password) { errEl.style.display='block'; errEl.textContent='Please enter email and password.'; return; }
  try {
    errEl.style.display='none';
    const btn = document.querySelector('button[onclick="doSignIn()"]');
    btn.textContent = 'Signing in...'; btn.disabled = true;
    await sb.signIn(email, password);
    const userStr = localStorage.getItem('pm_user');
    currentUser = userStr ? JSON.parse(userStr) : null;
    await initApp();
  } catch(e) {
    const errEl = document.getElementById('auth-error');
    if (errEl) { errEl.style.display='block'; errEl.textContent = e.message || 'Sign in failed. Check your email and password.'; }
    const btn = document.querySelector('button[onclick="doSignIn()"]');
    if (btn) { btn.textContent = 'Sign in'; btn.disabled = false; }
  }
}

// Debounce saves to avoid hammering the DB on every keystroke
const saveQueue = {};
function debounceSave(key, fn, delay=1500) {
  if (saveQueue[key]) clearTimeout(saveQueue[key]);
  saveQueue[key] = setTimeout(fn, delay);
}

function showSaving() {
  const el = document.getElementById('save-indicator');
  if (el) { el.textContent = 'Saving...'; el.style.color = 'rgba(255,255,255,0.5)'; }
}
function showSaved() {
  const el = document.getElementById('save-indicator');
  if (el) { el.textContent = 'Saved ✓'; el.style.color = 'rgba(255,255,255,0.6)'; setTimeout(()=>{if(el)el.textContent='';}, 2000); }
}
function showSaveError(msg) {
  const el = document.getElementById('save-indicator');
  if (el) { el.textContent = '⚠ Save failed'; el.style.color = '#F5A0B0'; }
}

// ── LOAD ALL DATA FROM SUPABASE ───────────────────────────────────────
async function loadAllData() {
  try {
    showSaving();
    const [eventsData, subEventsData, productsData, infraData, kitAllocsData] = await Promise.all([
      sb.query('events', '?order=sort_order.asc,created_at.asc'),
      sb.query('sub_events', '?order=sort_order.asc'),
      sb.query('build_products', ''),
      sb.query('build_infra', ''),
      sb.query('kit_allocations', ''),
    ]);

    // Rebuild events array in app format
    events = eventsData.map(ev => {
      const subs = subEventsData
        .filter(se => se.event_id === ev.id)
        .map(se => {
          const seProds = {};
          productsData.filter(p => p.sub_event_id === se.id).forEach(p => {
            seProds[p.product_name] = {qty: p.qty, price: p.unit_price};
          });
          const seInfra = {};
          infraData.filter(i => i.sub_event_id === se.id).forEach(i => {
            seInfra[i.item_name] = i.qty;
          });
          const seKit = {};
          kitAllocsData.filter(k => k.sub_event_id === se.id).forEach(k => {
            seKit[k.item_name] = k.qty;
          });
          return {
            id: se.id,
            name: se.name,
            service_type: se.service_type || '',
            responsibility: se.responsibility || '',
            customers: se.customers || '',
            pre: se.pre_date || '',
            build: se.build_date || '',
            show_dates: se.show_dates || [{s:'',e:''}],
            brk: se.brk_date || '',
            block_full_window: se.block_full_window || false,
            notes: se.notes || '',
            products: seProds,
            infra: seInfra,
            kit: seKit,
          };
        });

      const evProds = {};
      productsData.filter(p => p.event_id === ev.id && !p.sub_event_id).forEach(p => {
        evProds[p.product_name] = {qty: p.qty, price: p.unit_price};
      });
      const evInfra = {};
      infraData.filter(i => i.event_id === ev.id && !i.sub_event_id).forEach(i => {
        evInfra[i.item_name] = i.qty;
      });
      const evKit = {};
      kitAllocsData.filter(k => k.event_id === ev.id && !k.sub_event_id).forEach(k => {
        evKit[k.item_name] = k.qty;
      });

      return {
        id: ev.id,
        name: ev.name,
        code: ev.code || '',
        format: ev.format || 'Festival',
        venue: ev.venue || '',
        responsibility: ev.responsibility || '',
        customers: ev.customers || '',
        services: ev.services || [],
        pre: ev.pre_date || '',
        build: ev.build_date || '',
        show_dates: ev.show_dates || [{s:'',e:''}],
        brk: ev.brk_date || '',
        notes: ev.notes || '',
        ai_notes: ev.ai_notes || '',
        use_sub_events: ev.use_sub_events || false,
        sub_events: subs,
        products: evProds,
        infra: evInfra,
        kit: evKit,
      };
    });

    showSaved();
    return true;
  } catch(e) {
    console.error('Load error:', e);
    showSaveError(e.message);
    return false;
  }
}

// ── SAVE EVENT TO SUPABASE ────────────────────────────────────────────
async function saveEventToDB(ev) {
  showSaving();
  try {
    const evData = {
      id: ev.id,
      name: ev.name,
      code: ev.code,
      format: ev.format,
      venue: ev.venue,
      responsibility: ev.responsibility,
      customers: ev.customers,
      services: ev.services,
      pre_date: ev.pre || null,
      build_date: ev.build || null,
      show_dates: ev.show_dates,
      brk_date: ev.brk || null,
      notes: ev.notes,
      ai_notes: ev.ai_notes,
      use_sub_events: ev.use_sub_events || false,
      updated_at: new Date().toISOString(),
    };
    await sb.upsert('events', evData, 'id');

    // Save sub-events
    for (let i=0; i<(ev.sub_events||[]).length; i++) {
      const se = ev.sub_events[i];
      await sb.upsert('sub_events', {
        id: se.id,
        event_id: ev.id,
        name: se.name,
        service_type: se.service_type,
        responsibility: se.responsibility,
        customers: se.customers,
        pre_date: se.pre || null,
        build_date: se.build || null,
        show_dates: se.show_dates,
        brk_date: se.brk || null,
        block_full_window: se.block_full_window || false,
        notes: se.notes,
        sort_order: i,
        updated_at: new Date().toISOString(),
      }, 'id');
    }
    showSaved();
  } catch(e) {
    showSaveError(e.message);
    console.error('Save error:', e);
  }
}

// ── SAVE BUILD FIGURES TO SUPABASE ────────────────────────────────────
async function saveBuildFiguresToDB(evId, seId) {
  debounceSave('build_'+evId+'_'+(seId||''), async () => {
    showSaving();
    try {
      const ev = events.find(e => e.id === evId);
      if (!ev) return;
      const target = seId ? ev.sub_events?.find(s => s.id === seId) : ev;
      if (!target) return;

      // Upsert products
      const prodRows = Object.entries(target.products||{}).map(([name, pd]) => ({
        event_id: evId,
        sub_event_id: seId || null,
        product_name: name,
        qty: pd.qty || 0,
        unit_price: pd.price || 0,
        updated_at: new Date().toISOString(),
      }));
      if (prodRows.length) {
        // Delete existing then insert (simpler than upsert on composite key)
        const delUrl = seId
          ? `?event_id=eq.${evId}&sub_event_id=eq.${seId}`
          : `?event_id=eq.${evId}&sub_event_id=is.null`;
        await fetch(`${SUPABASE_URL}/rest/v1/build_products${delUrl}`, {method:'DELETE', headers:sb.headers});
        await sb.insert('build_products', prodRows);
      }

      // Upsert infra
      const infraRows = Object.entries(target.infra||{}).map(([name, qty]) => ({
        event_id: evId,
        sub_event_id: seId || null,
        item_name: name,
        qty: qty,
        updated_at: new Date().toISOString(),
      }));
      if (infraRows.length) {
        const delUrl = seId
          ? `?event_id=eq.${evId}&sub_event_id=eq.${seId}`
          : `?event_id=eq.${evId}&sub_event_id=is.null`;
        await fetch(`${SUPABASE_URL}/rest/v1/build_infra${delUrl}`, {method:'DELETE', headers:sb.headers});
        await sb.insert('build_infra', infraRows);
      }
      showSaved();
    } catch(e) {
      showSaveError(e.message);
    }
  });
}

// ── SEED INITIAL EVENTS (run once if DB is empty) ─────────────────────
async function seedInitialData() {
  const existing = await sb.query('events', '?limit=1');
  if (existing.length > 0) return false; // Already seeded
  console.log('Seeding initial event data...');
  for (let i=0; i<events.length; i++) {
    const ev = events[i];
    ev.sort_order = i;
    await saveEventToDB(ev);
  }
  console.log('Seeded', events.length, 'events');
  return true;
}


// ── MODIFIED INIT ─────────────────────────────────────────────────────
async function initApp() {
  // Load reference data first (always from hardcoded)
  initEvents();
  
  // Check auth
  const session = sb.getSession();
  if (!session) {
    showLoginScreen();
    return;
  }
  const userStr2 = localStorage.getItem('pm_user');
  currentUser = userStr2 ? JSON.parse(userStr2) : null;
  updateUserUI();
  
  // Try to load from DB, fall back to hardcoded events if empty
  const loaded = await loadAllData();
  if (loaded && events.length === 0) {
    // DB is empty — seed with initial data
    initEvents(); // restore defaults
    await seedInitialData();
    await loadAllData(); // reload from DB to get proper IDs
  }
  
  render();
}

// Override saveEvent to also save to DB
const _origSaveEvent = saveEvent;
async function saveEvent() {
  _origSaveEvent();
  const ev = editingId ? events.find(e => e.id === editingId) : events[events.length-1];
  if (ev) await saveEventToDB(ev);
}

// Override deleteEvent to also delete from DB
const _origDeleteEvent = deleteEvent;
async function deleteEvent(id) {
  try {
    await sb.delete('events', id);
  } catch(e) { console.error('DB delete error:', e); }
  _origDeleteEvent(id);
}

// Override updateProductField to autosave
const _origUpdateProductField = updateProductField;
function updateProductField(input) {
  _origUpdateProductField(input);
  const evId = input.dataset.evid;
  const seIdx = input.dataset.seidx === 'null' ? null : parseInt(input.dataset.seidx);
  const ev = events.find(e => e.id === evId);
  const seId = (ev?.sub_events && seIdx !== null) ? ev.sub_events[seIdx]?.id : null;
  saveBuildFiguresToDB(evId, seId);
}

// Override updateInfraQty to autosave
const _origUpdateInfraQty = updateInfraQty;
function updateInfraQty(input) {
  _origUpdateInfraQty(input);
  const evId = input.dataset.evid;
  const seIdx = input.dataset.seidx === 'null' ? null : parseInt(input.dataset.seidx);
  const ev = events.find(e => e.id === evId);
  const seId = (ev?.sub_events && seIdx !== null) ? ev.sub_events[seIdx]?.id : null;
  saveBuildFiguresToDB(evId, seId);
}

// Start the app
initApp();
</script>
